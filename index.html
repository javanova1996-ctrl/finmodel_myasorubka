.dd-sec{font-size:10px;font-weight:600;color:#a8a29e;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px 3px}

.dd-item:hover{background:#f5f5f4}

.dd-check.on{background:#185FA5;border-color:#185FA5}

.dd-sep{height:0.5px;background:#f0ede9;margin:5px 0}

.dd-preset:hover{background:#f5f5f4;color:#1c1917}

.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:14px}

const f=v=>{const a=Math.abs(v);const s=a>=1e6?(a/1e6).toFixed(2)+' млн':a>=1e3?(a/1e3).toFixed(0)+' тыс':Math.round(a).toLocaleString('ru');return(v<0?'−':'')+s+' ₽';};
const p=v=>(v*100).toFixed(1)+'%';const sg=v=>v>=0?'green':'red';const tg=v=>v>=0?'bg':'br';
const gm=()=>ALL.filter(m=>sel.has(m));const ag=(u,k)=>gm().reduce((s,m)=>s+(RAW[m][u][k]||0),0);const nd=()=>gm().length===0;
const CH={};const dc=id=>{if(CH[id]){CH[id].destroy();delete CH[id];}};
function upLabel(){const ms=gm(),el=document.getElementById('pl');if(!el)return;if(ms.length===0)el.textContent='Не выбрано';else if(ms.length===1)el.textContent=ms[0];else if(ms.length===ALL.length)el.textContent='Янв — Мар';else el.textContent=ms.map(m=>SM[m]).join(', ');}
function upChecks(){ALL.forEach(m=>{const c=document.getElementById('ck-'+m);if(c)c.classList.toggle('on',sel.has(m));});upLabel();}
const pb=document.getElementById('pb'),dd=document.getElementById('dd');
pb.addEventListener('click',e=>{e.stopPropagation();dd.classList.toggle('open');});
document.addEventListener('click',()=>dd.classList.remove('open'));
dd.addEventListener('click',e=>e.stopPropagation());
document.querySelectorAll('.dd-item').forEach(el=>{el.addEventListener('click',()=>{const m=el.dataset.m;if(sel.has(m)){if(sel.size>1)sel.delete(m);}else sel.add(m);upChecks();rerender();});});
document.querySelectorAll('.dd-preset').forEach(el=>{el.addEventListener('click',()=>{const p=el.dataset.preset;if(p==='all')sel=new Set(ALL);else if(p==='last'){sel=new Set();sel.add(ALL[ALL.length-1]);}else{sel=new Set();sel.add(ALL[0]);}upChecks();rerender();dd.classList.remove('open');});});
upChecks();
let AP='overview';
function rerender(){if(AP==='overview')renderOverview();else if(AP==='units')renderUnitBody();else if(AP==='costs')renderCostsBody();else if(AP==='scenario')updateScenario();else if(AP==='tbz')renderTBZ();}
document.querySelectorAll('.np').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.np').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');AP=b.dataset.p;document.getElementById(AP).classList.add('active');rerender();});});

function renderOverview(){
  const pg=document.getElementById('overview');if(nd()){pg.innerHTML=`<div class="no-data">Выберите месяц</div>`;return;}
  const ms=gm(),n=ms.length,d=k=>ag('ИТОГО',k),vyr=d('vyr'),vp=d('vp'),chp=d('chp'),div=d('div'),dolg=d('dolg'),zatr=d('zatr'),pr=d('pr'),op=d('op'),arenda=d('arenda'),zp=d('zp'),kred=d('kred'),varOPR=d('kom')+d('zapcz')+d('ohz')+d('poteri')+d('proch'),fixed=op-varOPR,kmd=vyr?vp/vyr:0;
  pg.innerHTML=`<div class="g3"><div class="kpi neu"><div class="kl">Выручка${n>1?' ('+n+' мес.)':''}</div><div class="kv">${f(vyr)}</div><div class="ks">${n>1?f(Math.round(vyr/n))+' в среднем/мес.':ms[0]}</div></div><div class="kpi ${sg(vp)}"><div class="kl">Валовая прибыль</div><div class="kv ${sg(vp)}">${f(vp)}</div><div class="ks">КМД: ${p(kmd)}</div></div><div class="kpi ${sg(chp)}"><div class="kl">Чистая прибыль</div><div class="kv ${sg(chp)}">${f(chp)}</div><div class="ks">${p(vyr?chp/vyr:0)} рентабельность</div></div></div>
  <div class="g2"><div class="card"><div class="st">Выручка и ЧП по месяцам</div><div style="position:relative;height:175px"><canvas id="ch_v" role="img" aria-label="Выручка и ЧП"></canvas></div></div><div class="card"><div class="st">ЧП по подразделениям</div><div style="position:relative;height:175px"><canvas id="ch_c" role="img" aria-label="ЧП по подразделениям"></canvas></div></div></div>
  <div class="g2"><div class="card"><div class="st">Кассовая нагрузка</div>${[['Чистая прибыль',chp],['Дивиденды выплачены',-div],['Погашение долга',-dolg]].map(([l,v])=>`<div class="row"><span class="rl">${l}</span><span class="rv ${sg(v)}">${f(v)}</span></div>`).join('')}</div><div class="card"><div class="st">Ключевые коэффициенты</div>${[['Аренда / выручка',p(vyr?arenda/vyr:0),arenda/vyr>0.07],['ФОТ / выручка',p(vyr?zp/vyr:0),false],['Кредиты / выручка',p(vyr?kred/vyr:0),kred/vyr>0.03],['Пост. ОПР / выручка',p(vyr?fixed/vyr:0),false]].map(([l,v,w])=>`<div class="row"><span class="rl">${l}</span><span class="rv">${w?`<span class="ba">${v} !</span>`:v}</span></div>`).join('')}</div></div>`;
  dc('ch_v');dc('ch_c');
  CH['ch_v']=new Chart(document.getElementById('ch_v'),{type:'bar',data:{labels:ALL,datasets:[{data:ALL.map(m=>sel.has(m)?Math.round(RAW[m]['ИТОГО'].vyr):null),backgroundColor:ALL.map(m=>sel.has(m)?'#378ADD':'#E7E5E4'),borderRadius:5,barPercentage:.45},{data:ALL.map(m=>sel.has(m)?Math.round(RAW[m]['ИТОГО'].chp):null),backgroundColor:ALL.map(m=>sel.has(m)?(RAW[m]['ИТОГО'].chp>=0?'#1D9E75':'#E24B4A'):'#E7E5E4'),borderRadius:5,barPercentage:.45}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v/1e6).toFixed(1)+'М'}}}}});
  const cd=UNITS.map(u=>Math.round(ag(u,'chp')));
  CH['ch_c']=new Chart(document.getElementById('ch_c'),{type:'bar',data:{labels:UNITS,datasets:[{data:cd,backgroundColor:cd.map(v=>v>=0?'#1D9E75':'#E24B4A'),borderRadius:5,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v/1e3).toFixed(0)+'к'}}}}});
}

let su='Халтурина';
function renderUnits(){const pg=document.getElementById('units');pg.innerHTML=`<div class="up-pills" id="ups">${UNITS.map(u=>`<button class="up${u===su?' active':''}" data-u="${u}">${u}</button>`).join('')}</div><div id="ub"></div>`;pg.querySelectorAll('.up').forEach(b=>b.addEventListener('click',()=>{su=b.dataset.u;renderUnitBody();}));renderUnitBody();}
function renderUnitBody(){
  if(!document.getElementById('ups'))return;
  document.querySelectorAll('.up').forEach(b=>b.classList.toggle('active',b.dataset.u===su));
  const ub=document.getElementById('ub');if(!ub)return;
  if(nd()){ub.innerHTML=`<div class="no-data">Выберите месяц</div>`;return;}
  const ms=gm(),n=ms.length,u=su,d=k=>ag(u,k),vyr=d('vyr'),vp=d('vp'),chp=d('chp'),op=d('op'),arenda=d('arenda'),zp=d('zp'),kred=d('kred'),nzp=d('nzp'),info=d('info'),ship=d('ship'),buh=d('buh'),rko=d('rko'),kmd=vyr?vp/vyr:0,fixed=arenda+zp+nzp+info+ship+buh+rko+kred,tbz=kmd>0?fixed/kmd:0,safety=vyr-tbz;
  ub.innerHTML=`<div class="g3" style="margin-bottom:12px"><div class="kpi neu"><div class="kl">Выручка${n>1?' ('+n+' мес.)':''}</div><div class="kv">${f(vyr)}</div>${n>1?`<div class="ks">${f(Math.round(vyr/n))}/мес.</div>`:''}</div><div class="kpi ${sg(vp)}"><div class="kl">Валовая прибыль</div><div class="kv ${sg(vp)}">${f(vp)}</div><div class="ks">${p(vyr?vp/vyr:0)} от выручки</div></div><div class="kpi ${sg(chp)}"><div class="kl">Чистая прибыль</div><div class="kv ${sg(chp)}">${f(chp)}</div><div class="ks">${p(vyr?chp/vyr:0)} рентабельность</div></div></div>
  <div class="g2"><div class="card"><div class="st">Динамика</div><div style="position:relative;height:155px"><canvas id="ch_ud" role="img" aria-label="Динамика ${u}"></canvas></div></div><div class="card"><div class="st">Точка безубыточности</div>${[['КМД',p(kmd)],['Пост. расходы',f(fixed)],['ТБЗ',f(tbz)],['Запас / дефицит',f(safety)]].map(([l,v],i)=>`<div class="row"><span class="rl">${l}</span><span class="rv${i===3?' '+sg(safety):''}">${v}</span></div>`).join('')}<div class="bar-wrap" style="margin-top:10px"><div class="bar-fill" style="width:${Math.min(100,tbz?vyr/tbz*100:100).toFixed(1)}%;background:${safety>=0?'#1D9E75':'#E24B4A'}"></div></div>${safety>=0?`<div class="ok" style="margin-top:8px">Выше ТБЗ — запас ${p(vyr?safety/vyr:0)}</div>`:`<div class="warn" style="margin-top:8px">Дефицит ${f(Math.abs(safety))}</div>`}</div></div>
  <div class="card"><div class="st">P&L за период</div><table class="t"><tr><th>Показатель</th>${ms.map(m=>`<th>${SM[m]}</th>`).join('')}${n>1?'<th>Итого</th>':''}</tr>${[['Выручка','vyr'],['Произв. затраты','pr'],['Валовая прибыль','vp'],['ОПР','op'],['Чистая прибыль','chp']].map(([l,k],i)=>`<tr${i%2===0?' class="hl"':''}><td>${l}</td>${ms.map(m=>`<td class="${k==='chp'||k==='vp'?sg(RAW[m][u][k]):''}">${f(RAW[m][u][k])}</td>`).join('')}${n>1?`<td class="${k==='chp'||k==='vp'?sg(d(k)):''}"><b>${f(d(k))}</b></td>`:''}</tr>`).join('')}</table></div>`;
  dc('ch_ud');
  CH['ch_ud']=new Chart(document.getElementById('ch_ud'),{type:'line',data:{labels:ALL,datasets:[{data:ALL.map(m=>sel.has(m)?Math.round(RAW[m][u].vyr):null),borderColor:'#378ADD',tension:.35,fill:false,spanGaps:false,pointBackgroundColor:'#378ADD',pointRadius:4},{data:ALL.map(m=>sel.has(m)?Math.round(RAW[m][u].chp):null),borderColor:'#E24B4A',tension:.35,fill:false,spanGaps:false,pointBackgroundColor:'#E24B4A',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v/1e3).toFixed(0)+'к'}}}}});
}

function renderCosts(){document.getElementById('costs').innerHTML=`<div id="cb"></div>`;renderCostsBody();}
function renderCostsBody(){
  const cb=document.getElementById('cb');if(!cb)return;if(nd()){cb.innerHTML=`<div class="no-data">Выберите месяц</div>`;return;}
  const d=k=>ag('ИТОГО',k),vyr=d('vyr'),pr=d('pr'),op=d('op'),varOPR=d('kom')+d('zapcz')+d('ohz')+d('poteri')+d('proch'),fixed=op-varOPR;
  cb.innerHTML=`<div class="g3"><div class="kpi neu"><div class="kl">Производственные</div><div class="kv">${f(pr)}</div><div class="ks">${p(vyr?pr/vyr:0)} от выручки</div></div><div class="kpi neg"><div class="kl">Постоянные ОПР</div><div class="kv">${f(fixed)}</div><div class="ks">${p(vyr?fixed/vyr:0)} от выручки</div></div><div class="kpi neg"><div class="kl">Переменные ОПР</div><div class="kv">${f(varOPR)}</div><div class="ks">${p(vyr?varOPR/vyr:0)} от выручки</div></div></div>
  <div class="g2"><div class="card"><div class="st">Производственные (переменные)</div>${[['НДС 5%','nds'],['УСН 6%','usn'],['Себест. закупной','seb_z'],['Себест. собств.','seb_s'],['Упаковка','upak'],['Доставка','dost'],['Эквайринг','ekv']].map(([l,k])=>{const v=d(k);return v>0?`<div class="row"><span class="rl">${l}</span><span class="rv">${f(v)} <span style="font-size:10px;color:#a8a29e">${p(vyr?v/vyr:0)}</span></span></div>`:''}).join('')}</div>
  <div class="card"><div class="st">Постоянные</div>${[['Аренда','arenda'],['ФОТ','zp'],['Налоги на ЗП','nzp'],['% по кредитам','kred'],['Инф. услуги','info'],['Шипицын СГ','ship'],['Бухгалтерия','buh'],['РКО','rko']].map(([l,k])=>{const v=d(k),isAr=k==='arenda'&&v/vyr>0.07;return v>0?`<div class="row"><span class="rl">${l}</span><span class="rv">${isAr?`<span class="ba">${f(v)}</span>`:f(v)} <span style="font-size:10px;color:#a8a29e">${p(vyr?v/vyr:0)}</span></span></div>`:''}).join('')}<div class="sep"></div><div class="st" style="margin-top:0">Переменные ОПР</div>${[['Коммунальные','kom'],['Запчасти','zapcz'],['Общехоз.','ohz'],['Потери','poteri'],['Прочие','proch']].map(([l,k])=>{const v=d(k);return v>0?`<div class="row"><span class="rl">${l}</span><span class="rv">${f(v)} <span style="font-size:10px;color:#a8a29e">${p(vyr?v/vyr:0)}</span></span></div>`:''}).join('')}</div></div>
  <div class="card"><div class="st">Аренда по точкам — доля в выручке (норма ≤7%)</div>${UNITS.map(u=>{const a=ag(u,'arenda'),v=ag(u,'vyr'),r=v?a/v:0;return a>0?`<div class="row"><span class="rl">${u}</span><div style="flex:1;margin:0 12px"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(100,r/0.15*100).toFixed(1)}%;background:${r>0.07?'#E24B4A':'#1D9E75'}"></div></div></div><span class="${r>0.07?'br':'bg'}">${p(r)}</span></div>`:''}).join('')}</div>`;
}

let sc={vyr_delta:0,nac_delta:0,arenda_delta:0,zp_delta:0,kred_delta:0};
function renderScenario(){
  const pg=document.getElementById('scenario');
  pg.innerHTML=`<div class="g2"><div class="card"><div class="st">Параметры сценария</div>${[['vyr_delta','Изменение выручки','%',-30,50],['nac_delta','Изменение наценки','пп',-10,20],['arenda_delta','Изменение аренды','%',-30,30],['zp_delta','Изменение ФОТ','%',-20,30],['kred_delta','% по кредитам','%',-100,50]].map(([k,l,u,mn,mx])=>`<div class="sl-row"><label>${l}</label><input type="range" min="${mn}" max="${mx}" step="1" value="${sc[k]}" id="sl_${k}"><span class="sl-val" id="ov_${k}">${sc[k]>=0?'+':''}${sc[k]} ${u}</span></div>`).join('')}<button class="reset-btn" onclick="resetSc()">Сбросить</button></div><div class="card" id="scr"></div></div><div class="card"><div class="st">Факт vs сценарий — ЧП по подразделениям</div><div style="position:relative;height:190px"><canvas id="ch_sc" role="img" aria-label="Сравнение"></canvas></div></div>`;
  ['vyr_delta','nac_delta','arenda_delta','zp_delta','kred_delta'].forEach(k=>{const sl=document.getElementById('sl_'+k);if(sl)sl.addEventListener('input',()=>{sc[k]=+sl.value;updateScenario();});});
  updateScenario();
}
function resetSc(){sc={vyr_delta:0,nac_delta:0,arenda_delta:0,zp_delta:0,kred_delta:0};['vyr_delta','nac_delta','arenda_delta','zp_delta','kred_delta'].forEach(k=>{const s=document.getElementById('sl_'+k);if(s)s.value=0;});updateScenario();}
function calcSc(u){const t={vyr:0,vp:0,arenda:0,zp:0,kred:0,op:0};gm().forEach(m=>Object.keys(t).forEach(k=>t[k]+=(RAW[m][u][k]||0)));const vs=t.vyr*(1+sc.vyr_delta/100),vps=t.vp+t.vyr*(sc.nac_delta/100)+(vs-t.vyr)*(t.vyr?t.vp/t.vyr:0),ops=t.op-t.arenda-t.zp-t.kred+t.arenda*(1+sc.arenda_delta/100)+t.zp*(1+sc.zp_delta/100)+t.kred*(1+sc.kred_delta/100);return{vs,vps,cs:vps-ops};}
function updateScenario(){
  if(nd()){const r=document.getElementById('scr');if(r)r.innerHTML=`<div class="no-data">Выберите месяц</div>`;return;}
  ['vyr_delta','nac_delta','arenda_delta','zp_delta','kred_delta'].forEach(k=>{const o=document.getElementById('ov_'+k),u=k==='nac_delta'?'пп':'%';if(o)o.textContent=(sc[k]>=0?'+':'')+sc[k]+' '+u;});
  const s=calcSc('ИТОГО'),fact=gm().reduce((a,m)=>a+(RAW[m]['ИТОГО'].chp||0),0);
  const r=document.getElementById('scr');
  if(r)r.innerHTML=`<div class="st">Результат (группа)</div>${[['Выручка (сценарий)',s.vs,false],['Валовая прибыль',s.vps,true],['ЧП факт',fact,true],['ЧП сценарий',s.cs,true]].map(([l,v,c])=>`<div class="row"><span class="rl">${l}</span><span class="rv${c?' '+sg(v):''}">${f(v)}</span></div>`).join('')}<div class="sep"></div><div class="row"><span class="rl">Изменение ЧП</span><span class="rv ${sg(s.cs-fact)}">${s.cs-fact>=0?'+':''}${f(s.cs-fact)}</span></div>${s.cs>=0?`<div class="ok" style="margin-top:8px">Сценарий выводит группу в прибыль</div>`:`<div class="warn" style="margin-top:8px">Убыток: ${f(s.cs)}</div>`}`;
  dc('ch_sc');
  const fd=UNITS.map(u=>Math.round(gm().reduce((a,m)=>a+(RAW[m][u].chp||0),0))),sd=UNITS.map(u=>Math.round(calcSc(u).cs));
  CH['ch_sc']=new Chart(document.getElementById('ch_sc'),{type:'bar',data:{labels:UNITS,datasets:[{label:'Факт',data:fd,backgroundColor:'#D6D3D1',borderRadius:4,barPercentage:.6},{label:'Сценарий',data:sd,backgroundColor:sd.map(v=>v>=0?'#1D9E75':'#E24B4A'),borderRadius:4,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v/1e3).toFixed(0)+'к'}}}}});
}

function renderTBZ(){
  const pg=document.getElementById('tbz');if(nd()){pg.innerHTML=`<div class="no-data">Выберите месяц</div>`;return;}
  const ms=gm(),n=ms.length,shops=UNITS.filter(u=>u!=='Цех'),td=shops.map(u=>{const d=k=>ag(u,k),vyr=d('vyr'),vp=d('vp'),kmd=vyr?vp/vyr:0,fx=d('arenda')+d('zp')+d('nzp')+d('info')+d('ship')+d('buh')+d('rko')+d('kred'),tbz=kmd>0?fx/kmd:0,safety=vyr-tbz;return{u,vyr,kmd,fx,tbz,safety};});
  pg.innerHTML=`<div class="g2">${td.map(({u,vyr,kmd,fx,tbz,safety})=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:600">${u}</span><span class="${tg(safety)}">${safety>=0?'Выше ТБЗ':'Ниже ТБЗ'}</span></div>${[['Выручка',f(vyr),''],['КМД',p(kmd),''],['Пост. расходы',f(fx),''],['ТБЗ',f(tbz),''],['Запас / дефицит',f(safety),sg(safety)]].map(([l,v,c])=>`<div class="row"><span class="rl">${l}</span><span class="rv${c?' '+c:''}">${v}</span></div>`).join('')}<div class="bar-wrap" style="margin-top:10px"><div class="bar-fill" style="width:${Math.min(100,tbz?vyr/tbz*100:100).toFixed(1)}%;background:${safety>=0?'#1D9E75':'#E24B4A'}"></div></div>${safety<0?`<div class="warn" style="margin-top:8px">Нужен оборот +${f(Math.abs(safety))}</div>`:`<div class="ok" style="margin-top:8px">Запас ${p(vyr?safety/vyr:0)}</div>`}</div>`).join('')}</div>
  <div class="card"><div class="st">Выручка vs ТБЗ по точкам</div><div style="position:relative;height:190px"><canvas id="ch_tbz" role="img" aria-label="ТБЗ по точкам"></canvas></div></div>`;
  dc('ch_tbz');
  CH['ch_tbz']=new Chart(document.getElementById('ch_tbz'),{type:'bar',data:{labels:shops,datasets:[{label:'Выручка',data:td.map(d=>Math.round(d.vyr)),backgroundColor:'#378ADD',borderRadius:5,barPercentage:.55},{label:'ТБЗ',data:td.map(d=>Math.round(d.tbz)),backgroundColor:'#E24B4A',borderRadius:5,barPercentage:.55}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>(v/1e3).toFixed(0)+'к'}}}}});
}

renderOverview();
</script>
</body>
